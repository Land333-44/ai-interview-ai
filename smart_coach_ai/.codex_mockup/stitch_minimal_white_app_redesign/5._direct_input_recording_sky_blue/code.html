<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#e3e1ee",
                    "on-primary-container": "#fffbff",
                    "inverse-surface": "#2f3131",
                    "on-tertiary-fixed": "#1a1b24",
                    "outline": "#797587",
                    "tertiary": "#5b5b66",
                    "surface-dim": "#dadada",
                    "surface-container": "#eeeeee",
                    "inverse-on-surface": "#f0f1f1",
                    "surface-tint": "#5d3fe0",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#c6c5d2",
                    "secondary-fixed": "#e5e2e1",
                    "surface-variant": "#e2e2e2",
                    "error": "#ba1a1a",
                    "secondary-container": "#e2dfde",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#474746",
                    "on-background": "#1a1c1c",
                    "on-secondary": "#ffffff",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#e5deff",
                    "primary": "#5b3cdd",
                    "surface-container-low": "#f3f3f4",
                    "on-secondary-container": "#636262",
                    "primary-fixed-dim": "#c9bfff",
                    "primary-container": "#7459f7",
                    "on-tertiary-container": "#fffbff",
                    "surface-container-high": "#e8e8e8",
                    "inverse-primary": "#c9bfff",
                    "surface-container-highest": "#e2e2e2",
                    "surface": "#f9f9f9",
                    "on-surface": "#1a1c1c",
                    "on-secondary-fixed": "#1c1b1b",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#c8c6c5",
                    "on-surface-variant": "#484555",
                    "secondary": "#5f5e5e",
                    "on-tertiary-fixed-variant": "#464650",
                    "surface-bright": "#f9f9f9",
                    "on-primary-fixed": "#1a0063",
                    "outline-variant": "#c9c4d8",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#441cc8",
                    "background": "#f9f9f9",
                    "tertiary-container": "#74737f",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "20px",
                    "full": "9999px"
            },
            "spacing": {
                    "lg": "24px",
                    "xl": "32px",
                    "unit": "4px",
                    "xs": "4px",
                    "gutter": "12px",
                    "container-padding": "20px",
                    "sm": "8px",
                    "md": "16px"
            },
            "fontFamily": {
                    "h1": ["Manrope"],
                    "body-md": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "h2": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "h3": ["Manrope"]
            },
            "fontSize": {
                    "h1": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                    "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-shadow {
            box-shadow: 0 0 0 0 rgba(123, 97, 255, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(123, 97, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(123, 97, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(123, 97, 255, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md antialiased">
<!-- Top AppBar -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shadow-[0_4px_15px_0_rgba(0,0,0,0.06)] docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-5 h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-[#7B61FF] dark:text-[#A291FF]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] text-lg font-bold tracking-tight text-slate-900 dark:text-white">New Session</h1>
</div>
<div class="flex items-center">
<button class="active:scale-95 transition-transform duration-200 text-[#7B61FF] dark:text-[#A291FF]">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-container-padding py-lg pb-32">
<!-- Input Method Selection -->
<section class="mb-xl">
<h2 class="font-h3 text-h3 mb-md text-on-surface-variant">Select Input Method</h2>
<div class="grid grid-cols-3 gap-gutter">
<!-- Video Tab -->
<button class="flex flex-col items-center justify-center p-md bg-surface-container-lowest border border-outline-variant rounded-2xl hover:bg-slate-50 transition-all duration-200 group">
<span class="material-symbols-outlined text-secondary mb-2 group-hover:text-primary transition-colors">videocam</span>
<span class="font-label-sm text-label-sm text-secondary uppercase">Video</span>
</button>
<!-- Audio Tab (Active) -->
<button class="flex flex-col items-center justify-center p-md bg-[#F4F2FF] border-2 border-[#7B61FF] rounded-2xl transition-all duration-200">
<span class="material-symbols-outlined text-[#7B61FF] mb-2" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-label-sm text-label-sm text-[#7B61FF] uppercase font-bold">Audio</span>
</button>
<!-- Text Tab -->
<button class="flex flex-col items-center justify-center p-md bg-surface-container-lowest border border-outline-variant rounded-2xl hover:bg-slate-50 transition-all duration-200 group">
<span class="material-symbols-outlined text-secondary mb-2 group-hover:text-primary transition-colors">edit_note</span>
<span class="font-label-sm text-label-sm text-secondary uppercase">Text</span>
</button>
</div>
</section>
<!-- Live Input Area -->
<section class="bg-white rounded-3xl p-xl shadow-[0_4px_25px_0_rgba(0,0,0,0.06)] border border-slate-50 flex flex-col items-center text-center mb-xl min-h-[340px] justify-center">
<div class="mb-xl">
<div class="relative inline-block">
<div class="pulse-shadow rounded-full p-unit">
<button class="w-24 h-24 bg-[#7B61FF] text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
</div>
<p class="font-h3 text-h3 mt-lg text-slate-900">Tap to start recording</p>
<p class="font-body-md text-body-md text-slate-500 mt-xs">Recording session ready</p>
</div>
<!-- Waveform Visualization -->
<div class="w-full flex items-end justify-center gap-[3px] h-12 mb-md">
<div class="w-1.5 h-3 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-6 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-8 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-10 bg-primary-container rounded-full"></div>
<div class="w-1.5 h-4 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-8 bg-primary-container rounded-full"></div>
<div class="w-1.5 h-12 bg-primary-container rounded-full"></div>
<div class="w-1.5 h-6 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-9 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-5 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-10 bg-primary-container rounded-full"></div>
<div class="w-1.5 h-4 bg-primary-fixed rounded-full"></div>
<div class="w-1.5 h-7 bg-primary-fixed rounded-full"></div>
</div>
</section>
<!-- AI Guidance Card -->
<section class="bg-[#F4F2FF] p-md rounded-2xl border border-[#DED9FF] flex gap-md items-start">
<div class="bg-white p-2 rounded-xl shadow-sm">
<span class="material-symbols-outlined text-[#7B61FF]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h4 class="font-label-sm text-label-sm text-[#7B61FF] uppercase mb-1">AI Guidance</h4>
<p class="font-body-md text-body-md text-on-surface-variant leading-tight">
                    Speak clearly and minimize background noise for the most accurate emotional analysis.
                </p>
</div>
</section>
<!-- Bottom Action Button -->
<div class="mt-xl">
<button class="w-full h-14 bg-[#7B61FF] text-white font-h3 text-h3 rounded-2xl shadow-[0_8px_25px_-5px_rgba(123,97,255,0.4)] active:scale-95 transition-transform duration-200">
                Start Recording
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-white dark:bg-slate-900 fixed bottom-0 w-full z-50 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_15px_0_rgba(0,0,0,0.04)] flex justify-around items-center h-20 px-2 pb-safe">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Upload</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Analysis</span>
</a>
<a class="flex flex-col items-center justify-center text-[#7B61FF] dark:text-[#A291FF] bg-[#F4F2FF] dark:bg-indigo-900/20 rounded-2xl px-4 py-1.5 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="smart_toy" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Coach</span>
</a>
</nav>
</body></html>
