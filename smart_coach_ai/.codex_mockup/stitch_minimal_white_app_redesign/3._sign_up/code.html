<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "outline": "#797587",
                        "primary": "#5b3cdd",
                        "surface-variant": "#e2e2e2",
                        "tertiary-fixed": "#e3e1ee",
                        "on-surface": "#1a1c1c",
                        "inverse-on-surface": "#f0f1f1",
                        "surface-container-highest": "#e2e2e2",
                        "error-container": "#ffdad6",
                        "surface-container": "#eeeeee",
                        "tertiary-fixed-dim": "#c6c5d2",
                        "tertiary": "#5b5b5b",
                        "outline-variant": "#c9c4d8",
                        "surface-dim": "#dadada",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#c9bfff",
                        "surface-container-low": "#f3f3f4",
                        "on-background": "#1a1c1c",
                        "on-secondary-fixed-variant": "#474746",
                        "on-surface-variant": "#484555",
                        "surface": "#f9f9f9",
                        "background": "#f9f9f9",
                        "on-primary-fixed-variant": "#441cc8",
                        "secondary": "#5f5e5e",
                        "on-tertiary-fixed": "#1a1b24",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed": "#e5deff",
                        "primary-container": "#7459f7",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#464650",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#1c1b1b",
                        "inverse-primary": "#c9bfff",
                        "secondary-fixed": "#e5e2e1",
                        "secondary-container": "#e2dfde",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "surface-tint": "#5d3fe0",
                        "tertiary-container": "#74737f",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#1a0063",
                        "on-secondary-container": "#636262",
                        "inverse-surface": "#2f3131",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "gutter": "12px",
                        "container-padding": "20px",
                        "sm": "8px",
                        "unit": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "h2": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "h3": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "h1": ["Manrope"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                        "h1": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .level-1-shadow {
            box-shadow: 0 4px 15px 0 rgba(0, 0, 0, 0.06);
        }
        .ai-chip {
            background-color: #e3e1ee;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface">
<!-- Transactional Screen: Navigation shells suppressed per Design Mandate -->
<main class="min-h-screen flex flex-col">
<!-- Hero Visual Section -->
<div class="relative h-64 md:h-80 overflow-hidden">
<img alt="Sign up visuals" class="w-full h-full object-cover" data-alt="A clean, minimalist workspace featuring a high-tech tablet and digital interfaces that glow with soft purple and blue light. The setting is a professional, bright office environment with a focus on productivity and high-end tech gear. Soft morning light floods the scene, creating a sense of fresh beginnings and modern corporate reliability. The visual aesthetic is airy and professional, aligning with a high-contrast light mode UI design." src="https://lh3.googleusercontent.com/aida/ADBb0ugBfy5Kxykx6VRSG_RKDzIa0SbhBs6z_g98JeSzKd3fP33mDvpQ30oimByftaHHNkJ3__u6lJmHYdiS1ohb18UGD1dEMYC5J-h2c6Gvor4BPXwtnNttjDiOvV7dIOh8-gNlvtOTZhUChXgVQrpWlIGreIvcNDj_U-DTIz54FUEyH4KOWDMO4ZXeh2j6A9ybZMoxgfq9NSRhSt18-OUNqs9El3c7KpBrmx24fXGF7B3BFyQlWBU3h41LBMVQoqW_Itp3N4KD2Ko0JI8"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-surface/20 to-transparent"></div>
</div>
<!-- Form Container -->
<div class="px-container-padding -mt-12 relative z-10 flex-grow pb-xl">
<div class="max-w-md mx-auto">
<!-- Header -->
<header class="mb-xl text-center md:text-left">
<h1 class="font-h1 text-h1 text-on-background mb-xs">Create Account 🚀</h1>
<p class="font-body-lg text-body-lg text-secondary">Start your journey</p>
</header>
<!-- Input Section -->
<section class="bg-surface-container-lowest level-1-shadow p-md rounded-xl border border-outline-variant/30">
<form class="space-y-lg">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline px-xs block">FULL NAME</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-size: 20px;">person</span>
<input class="w-full h-[56px] pl-12 pr-4 rounded-lg bg-surface border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline px-xs block">EMAIL ADDRESS</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-size: 20px;">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 rounded-lg bg-surface border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="email@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline px-xs block">PASSWORD</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-size: 20px;">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 rounded-lg bg-surface border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline px-xs block">CONFIRM PASSWORD</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-size: 20px;">verified_user</span>
<input class="w-full h-[56px] pl-12 pr-4 rounded-lg bg-surface border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full h-[56px] bg-primary text-on-primary font-h3 text-h3 rounded-lg shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm" type="submit">
                                Sign Up
                                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</section>
<!-- AI Feedback Chip / Context -->
<div class="mt-lg px-md py-sm ai-chip rounded-lg flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<p class="font-body-md text-on-tertiary-fixed-variant">Passwords must be 8+ characters with a mix of symbols.</p>
</div>
<!-- Secondary Actions -->
<footer class="mt-xl text-center">
<p class="font-body-md text-secondary">
                        Already have an account? 
                        <a class="text-primary font-bold hover:underline active:opacity-70 transition-all" href="#">Log In</a>
</p>
<div class="mt-xl flex items-center justify-center gap-lg opacity-40">
<div class="h-[1px] w-12 bg-outline"></div>
<span class="font-label-sm text-label-sm">OR CONTINUE WITH</span>
<div class="h-[1px] w-12 bg-outline"></div>
</div>
<div class="mt-lg flex justify-center gap-md">
<button class="w-14 h-14 rounded-full border border-outline-variant bg-white flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface">google</span>
</button>
<button class="w-14 h-14 rounded-full border border-outline-variant bg-white flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface">ios</span>
</button>
</div>
</footer>
</div>
</div>
</main>
</body></html>
