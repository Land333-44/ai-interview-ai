<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account - Luminous Coach</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Font: Manrope -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Lucide Icons for consistent iconography -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#7B61FF',
            surface: '#FFFFFF',
            'surface-container': '#F3F3F4',
            'text-muted': '#6B7280',
          },
          fontFamily: {
            manrope: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px', // ROUND_EIGHT from design system
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #FFFFFF;
      -webkit-tap-highlight-color: transparent;
    }
    input::placeholder {
      color: #9CA3AF;
    }
    .social-btn {
      transition: all 0.2s ease;
    }
    .social-btn:active {
      transform: scale(0.95);
      background-color: #F3F3F4;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6 sm:p-12">
<!-- BEGIN: SignupContainer -->
<main class="w-full max-w-sm mx-auto" data-purpose="signup-card">
<!-- BEGIN: HeaderSection -->
<section class="text-center mb-10" data-purpose="header">
<h1 class="text-3xl font-extrabold text-gray-900 flex items-center justify-center gap-2">
        Create Account 🚀
      </h1>
<p class="text-gray-500 mt-2 font-medium">Start your journey</p>
</section>
<!-- END: HeaderSection -->
<!-- BEGIN: RegistrationForm -->
<form class="space-y-4" data-purpose="registration-form">
<!-- Full Name Field -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<i class="w-5 h-5 text-gray-400" data-lucide="user"></i>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-custom focus:ring-2 focus:ring-primary text-gray-900 transition-all" placeholder="Full Name" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<i class="w-5 h-5 text-gray-400" data-lucide="mail"></i>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container border-none rounded-custom focus:ring-2 focus:ring-primary text-gray-900 transition-all" placeholder="Email" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<i class="w-5 h-5 text-gray-400" data-lucide="lock"></i>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container border-none rounded-custom focus:ring-2 focus:ring-primary text-gray-900 transition-all" id="password" placeholder="Password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600" type="button">
<i class="w-5 h-5" data-lucide="eye-off"></i>
</button>
</div>
<!-- Confirm Password Field -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<i class="w-5 h-5 text-gray-400" data-lucide="lock"></i>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container border-none rounded-custom focus:ring-2 focus:ring-primary text-gray-900 transition-all" id="confirm-password" placeholder="Confirm Password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600" type="button">
<i class="w-5 h-5" data-lucide="eye-off"></i>
</button>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-4 rounded-custom shadow-lg shadow-primary/25 transition-all transform active:scale-[0.98] mt-6" data-purpose="signup-button" type="submit">
        Sign Up
      </button>
</form>
<!-- END: RegistrationForm -->
<!-- BEGIN: FooterLinks -->
<div class="mt-8 text-center" data-purpose="footer-links">
<p class="text-gray-500 font-medium">
        Already have an account? 
        <a class="text-primary font-bold hover:underline" href="#">Log In</a>
</p>
<!-- BEGIN: SocialLoginSection -->
<div class="mt-10" data-purpose="social-login">
<div class="relative flex items-center justify-center mb-6">
<div class="flex-grow border-t border-gray-200"></div>
<span class="flex-shrink mx-4 text-gray-400 text-sm font-medium uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-gray-200"></div>
</div>
<div class="flex justify-center gap-4">
<button aria-label="Sign up with Google" class="social-btn p-3 rounded-custom border border-gray-200 bg-white">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button aria-label="Sign up with Apple" class="social-btn p-3 rounded-custom border border-gray-200 bg-white">
<i class="w-6 h-6 text-black" data-lucide="apple"></i>
</button>
<button aria-label="Sign up with Facebook" class="social-btn p-3 rounded-custom border border-gray-200 bg-white">
<i class="w-6 h-6 text-[#1877F2]" data-lucide="facebook"></i>
</button>
</div>
</div>
<!-- END: SocialLoginSection -->
</div>
<!-- END: FooterLinks -->
</main>
<!-- END: SignupContainer -->
<script data-purpose="icon-initialization">
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
<script data-purpose="password-toggle">
    // Basic interaction for password visibility toggles
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const icon = btn.querySelector('i');
        if (icon && (icon.getAttribute('data-lucide') === 'eye-off' || icon.getAttribute('data-lucide') === 'eye')) {
          e.preventDefault();
          const input = btn.previousElementSibling;
          if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye');
          } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye-off');
          }
          lucide.createIcons();
        }
      });
    });
  </script>
</body></html>
