<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "outline": "#8E8E93",
                    "primary": "#7B61FF",
                    "surface-variant": "#F2F2F7",
                    "tertiary-fixed": "#E3E1EE",
                    "on-surface": "#1C1C1E",
                    "inverse-on-surface": "#F2F2F7",
                    "surface-container-highest": "#E5E5EA",
                    "error-container": "#FFDAD6",
                    "surface-container": "#F2F2F7",
                    "tertiary-fixed-dim": "#C6C5D2",
                    "tertiary": "#5B5B66",
                    "outline-variant": "#D1D1D6",
                    "surface-dim": "#D1D1D6",
                    "error": "#FF3B30",
                    "primary-fixed-dim": "#C9BFFF",
                    "surface-container-low": "#F9F9F9",
                    "on-background": "#1C1C1E",
                    "on-secondary-fixed-variant": "#474746",
                    "on-surface-variant": "#636366",
                    "surface": "#FFFFFF",
                    "background": "#fbfbfb",
                    "on-primary-fixed-variant": "#5B3CDD",
                    "secondary": "#636366",
                    "on-tertiary-fixed": "#1A1B24",
                    "surface-bright": "#FFFFFF",
                    "on-tertiary-container": "#FFFBFF",
                    "primary-fixed": "#E5DEFF",
                    "primary-container": "#7B61FF",
                    "on-tertiary": "#FFFFFF",
                    "on-tertiary-fixed-variant": "#464650",
                    "surface-container-lowest": "#FFFFFF",
                    "on-secondary-fixed": "#1C1B1B",
                    "inverse-primary": "#C9BFFF",
                    "secondary-fixed": "#E5E2E1",
                    "secondary-container": "#F2F2F7",
                    "surface-container-high": "#EBEBF0",
                    "on-secondary": "#FFFFFF",
                    "on-primary-container": "#FFFFFF",
                    "surface-tint": "#7B61FF",
                    "tertiary-container": "#74737F",
                    "on-error-container": "#93000A",
                    "on-primary-fixed": "#1A0063",
                    "on-secondary-container": "#636262",
                    "inverse-surface": "#2C2C2E",
                    "on-error": "#FFFFFF",
                    "secondary-fixed-dim": "#C8C6C5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "3xl": "1.5rem",
                    "4xl": "2.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "gutter": "12px",
                    "container-padding": "20px",
                    "sm": "8px",
                    "unit": "4px",
                    "lg": "24px",
                    "xl": "32px",
                    "md": "16px"
            },
            "fontFamily": {
                    "h2": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "h3": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "h1": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                    "h1": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-elevation {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }
        .btn-shadow {
            box-shadow: 0 8px 24px -6px rgba(123, 97, 255, 0.4);
        }
        input::placeholder {
            color: #C1C1C1 !important;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Main Content Container -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding relative z-10 py-xl">
<div class="w-full max-w-[380px] bg-surface rounded-4xl p-xl soft-elevation border border-outline-variant/30">
<!-- Header Section -->
<div class="text-center mb-xl">
<div class="flex justify-center mb-md">
<div class="p-xs rounded-2xl bg-primary/5">
<img alt="Logo" class="w-14 h-14 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ugNCEkW7KjOpvgSBqbOClusn4isbjxqTQKCIkFxGFIRLVvH6l9P6dH6z5NEA8qIhwGF296MLMb4uK7iFJPmpEAlspMybiNCPoWf23szRlvQLyeDZuV3lz-DiC3WMJUwN-m_lPcxxALIPLDcBe6CkeaZKMtKOqJQIkjDsDOUHf6poRijAu4SeovEDwppZ0pjLrI9B5hbF5UGHL1Y1jIUCMDkP3jnUy3Ym0Opa8MsiafJI7bNsuj8VcbR5sY"/>
</div>
</div>
<h1 class="font-h1 text-[32px] leading-tight text-on-surface mb-xs tracking-tight">Welcome Back</h1>
<p class="font-body-md text-on-surface-variant/80">Log in to your account</p>
</div>
<!-- Form Section -->
<form class="space-y-lg">
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase tracking-widest ml-1">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-lg top-1/2 -translate-y-1/2 text-on-surface-variant/60">mail</span>
<input class="w-full h-[56px] pl-[52px] pr-md bg-white border border-outline-variant/40 rounded-2xl focus:border-primary/50 focus:ring-4 focus:ring-primary/5 outline-none transition-all font-body-md placeholder:text-[#C1C1C1]" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<div class="flex justify-between items-center ml-1">
<label class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase tracking-widest">Password</label>
<a class="text-[12px] text-primary font-bold hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-lg top-1/2 -translate-y-1/2 text-on-surface-variant/60">lock</span>
<input class="w-full h-[56px] pl-[52px] pr-[52px] bg-white border border-outline-variant/40 rounded-2xl focus:border-primary/50 focus:ring-4 focus:ring-primary/5 outline-none transition-all font-body-md placeholder:text-[#C1C1C1]" placeholder="••••••••" type="password"/>
<button class="absolute right-lg top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Log In Button -->
<button class="w-full h-[56px] bg-primary hover:bg-primary/90 text-on-primary font-h3 text-h3 rounded-2xl btn-shadow active:scale-[0.98] transition-all duration-300 mt-md" type="submit">
                    Log In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-xl">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="px-md font-label-sm text-label-sm text-on-surface-variant/50 uppercase tracking-widest">or</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Social Login -->
<button class="w-full h-[56px] bg-white border border-outline-variant/40 rounded-2xl flex items-center justify-center gap-sm hover:bg-surface-variant/40 transition-all duration-300 active:scale-[0.98]">
<svg fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-lg text-body-lg text-on-surface font-semibold">Continue with Google</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-on-surface-variant/80">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline ml-xs" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Bottom Spacing for safe area -->
<div class="h-xl"></div>
</body></html>
