<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "outline": "#E2E8F0",
                    "primary": "#7B61FF",
                    "surface-variant": "#F8FAFC",
                    "tertiary-fixed": "#F1F5F9",
                    "on-surface": "#1E293B",
                    "inverse-on-surface": "#F1F5F9",
                    "surface-container-highest": "#F1F5F9",
                    "error-container": "#FEE2E2",
                    "surface-container": "#F8FAFC",
                    "tertiary-fixed-dim": "#CBD5E1",
                    "tertiary": "#64748B",
                    "outline-variant": "#E2E8F0",
                    "surface-dim": "#F1F5F9",
                    "error": "#EF4444",
                    "primary-fixed-dim": "#C7BEFF",
                    "surface-container-low": "#FFFFFF",
                    "on-background": "#1E293B",
                    "on-secondary-fixed-variant": "#475569",
                    "on-surface-variant": "#64748B",
                    "surface": "#FFFFFF",
                    "background": "#FFFFFF",
                    "on-primary-fixed-variant": "#5B46D1",
                    "secondary": "#64748B",
                    "on-tertiary-fixed": "#1E293B",
                    "surface-bright": "#FFFFFF",
                    "on-tertiary-container": "#FFFFFF",
                    "primary-fixed": "#EBE8FF",
                    "primary-container": "#7B61FF",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed-variant": "#475569",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#1E293B",
                    "inverse-primary": "#C7BEFF",
                    "secondary-fixed": "#F1F5F9",
                    "secondary-container": "#F1F5F9",
                    "surface-container-high": "#F8FAFC",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#ffffff",
                    "surface-tint": "#7B61FF",
                    "tertiary-container": "#64748B",
                    "on-error-container": "#7F1D1D",
                    "on-primary-fixed": "#1E0061",
                    "on-secondary-container": "#475569",
                    "inverse-surface": "#1E293B",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#CBD5E1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "gutter": "12px",
                    "container-padding": "20px",
                    "sm": "8px",
                    "unit": "4px",
                    "lg": "24px",
                    "xl": "32px",
                    "md": "16px"
            },
            "fontFamily": {
                    "h2": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "h3": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "h1": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                    "h1": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .custom-dashed {
        background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23E2E8F0' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        border-radius: 12px;
      }
    </style>
</head>
<body class="bg-background font-body-md text-on-background min-h-screen pb-24">
<!-- Top App Bar -->
<header class="bg-white border-b border-slate-100 h-16 sticky top-0 z-50 flex justify-between items-center w-full px-5">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-slate-900">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] text-lg font-bold tracking-tight text-slate-900">New Session</h1>
</div>
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-slate-900">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-container-padding pt-lg">
<!-- Hero Visual Section -->
<section class="mb-xl">
<div class="relative w-full aspect-[1.5] rounded-xl overflow-hidden shadow-[0_4px_15px_0_rgba(0,0,0,0.04)] bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A clean, bright workspace with high-key lighting, featuring a modern smartphone and a microphone on a pristine white desk." src="https://lh3.googleusercontent.com/aida/ADBb0ugBfy5Kxykx6VRSG_RKDzIa0SbhBs6z_g98JeSzKd3fP33mDvpQ30oimByftaHHNkJ3__u6lJmHYdiS1ohb18UGD1dEMYC5J-h2c6Gvor4BPXwtnNttjDiOvV7dIOh8-gNlvtOTZhUChXgVQrpWlIGreIvcNDj_U-DTIz54FUEyH4KOWDMO4ZXeh2j6A9ybZMoxgfq9NSRhSt18-OUNqs9El3c7KpBrmx24fXGF7B3BFyQlWBU3h41LBMVQoqW_Itp3N4KD2Ko0JI8"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent"></div>
</div>
</section>
<!-- Input Type Selection -->
<section class="mb-xl">
<h2 class="font-h2 text-h2 mb-md text-on-surface">Choose your input type</h2>
<div class="grid grid-cols-3 gap-sm">
<!-- Video Option -->
<button class="flex flex-col items-center p-md bg-white rounded-xl border border-outline-variant hover:border-primary transition-colors group">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center mb-sm group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-icon="videocam">videocam</span>
</div>
<span class="font-label-sm text-label-sm text-secondary">Video</span>
</button>
<!-- Audio Option -->
<button class="flex flex-col items-center p-md bg-white rounded-xl border-2 border-primary transition-colors">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-primary" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<span class="font-label-sm text-label-sm text-primary font-bold">Audio</span>
</button>
<!-- Text Option -->
<button class="flex flex-col items-center p-md bg-white rounded-xl border border-outline-variant hover:border-primary transition-colors group">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center mb-sm group-hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-white" data-icon="description">description</span>
</div>
<span class="font-label-sm text-label-sm text-secondary">Text</span>
</button>
</div>
</section>
<!-- Upload Area -->
<section class="mb-xl">
<div class="custom-dashed p-xl flex flex-col items-center justify-center bg-white text-center cursor-pointer hover:bg-slate-50 transition-colors min-h-[200px]">
<div class="mb-md">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<p class="font-h3 text-h3 text-on-surface mb-xs">Upload file or drag &amp; drop</p>
<p class="font-body-md text-secondary">MP4, MOV, MP3 or WAV (Max. 500MB)</p>
</div>
<!-- AI Chip Suggestion -->
<div class="mt-md p-md bg-primary-fixed rounded-xl flex items-start gap-3 border border-primary/10">
<span class="material-symbols-outlined text-primary mt-0.5" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div>
<p class="font-label-sm text-primary uppercase tracking-wider mb-xs">AI Tip</p>
<p class="font-body-md text-on-surface">High-quality audio recording ensures 98% more accurate motion analysis and coaching feedback.</p>
</div>
</div>
</section>
<!-- Primary Action -->
<section class="mt-lg">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-h3 flex items-center justify-center shadow-[0_8px_25px_0_rgba(123,97,255,0.25)] active:scale-[0.98] transition-all">
                Continue
            </button>
</section>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-white border-t border-slate-100 flex justify-around items-center h-20 px-2 pb-safe">
<button class="flex flex-col items-center justify-center text-slate-500 px-4 py-1.5 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-primary bg-primary-fixed rounded-2xl px-4 py-1.5 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Upload</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 px-4 py-1.5 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Analysis</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 px-4 py-1.5 active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="smart_toy">smart_toy</span>
<span class="font-['Manrope'] text-[11px] font-semibold">Coach</span>
</button>
</nav>
</body></html>
