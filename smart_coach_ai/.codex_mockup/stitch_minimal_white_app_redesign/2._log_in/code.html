<!DOCTYPE html>

<html lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "on-background": "#1a1c1c",
                    "on-secondary-fixed-variant": "#474746",
                    "on-surface-variant": "#484555",
                    "surface": "#f9f9f9",
                    "background": "#f9f9f9",
                    "on-primary-fixed-variant": "#441cc8",
                    "secondary": "#5f5e5e",

                    "surface-bright": "#f9f9f9",

                    "on-secondary-fixed": "#1c1b1b",
                    "inverse-primary": "#c9bfff",

                    "on-secondary": "#ffffff",
                    "on-primary-container": "#fffbff",
                    "surface-tint": "#5d3fe0",

            "spacing": {
                    "xs": "4px",
                    "gutter": "12px",
                    "container-padding": "20px",
                    "sm": "8px",
                    "unit": "4px",
                    "lg": "24px",
                    "xl": "32px",
                    "md": "16px"
            },
            "fontFamily": {
                    "h2": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "h3": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "h1": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-light {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(123, 97, 255, 0.03) 100%);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Hero/Branding Image Section -->
<div class="relative w-full h-64 md:h-80 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A high-key, minimalist professional coaching environment with soft natural light streaming through large windows. The scene features abstract purple and white geometric glass structures reflecting clean lines and a sense of focused clarity. The atmosphere is sophisticated and encouraging, utilizing a modern light-mode aesthetic with deep blacks and vibrant purple accents, creating a sense of technological advancement and premium reliability." src="https://lh3.googleusercontent.com/aida/ADBb0ugBfy5Kxykx6VRSG_RKDzIa0SbhBs6z_g98JeSzKd3fP33mDvpQ30oimByftaHHNkJ3__u6lJmHYdiS1ohb18UGD1dEMYC5J-h2c6Gvor4BPXwtnNttjDiOvV7dIOh8-gNlvtOTZhUChXgVQrpWlIGreIvcNDj_U-DTIz54FUEyH4KOWDMO4ZXeh2j6A9ybZMoxgfq9NSRhSt18-OUNqs9El3c7KpBrmx24fXGF7B3BFyQlWBU3h41LBMVQoqW_Itp3N4KD2Ko0JI8"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
<!-- Main Content Container -->
<main class="flex-grow flex flex-col items-center px-container-padding -mt-12 relative z-10">
<div class="w-full max-w-md bg-surface-container-lowest rounded-[32px] p-xl shadow-[0_4px_25px_0_rgba(0,0,0,0.06)] border border-outline-variant/30">
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Welcome Back 👋</h1>
<p class="font-body-lg text-body-lg text-secondary">Log in to your account</p>
</div>
<!-- Form Section -->
<form class="space-y-lg">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-outline ml-sm">EMAIL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[56px] pl-12 pr-md bg-surface border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center ml-sm mr-sm">
<label class="font-label-sm text-label-sm text-outline">PASSWORD</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface border border-outline-variant rounded-xl focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-secondary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Log In Button -->
<button class="w-full h-[56px] bg-primary hover:bg-primary/90 text-on-primary font-h3 text-h3 rounded-xl shadow-lg active:scale-[0.98] transition-all duration-200" type="submit">
                    Log In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-xl">
<div class="flex-grow h-px bg-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-outline">OR</span>
<div class="flex-grow h-px bg-outline-variant"></div>
</div>
<!-- Social Login -->
<button class="w-full h-[56px] bg-white border border-outline-variant rounded-xl flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-lg text-body-lg text-on-surface">Continue with Google</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-xl pb-xl text-center">
<p class="font-body-md text-body-md text-secondary">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Bottom Spacing for safe area -->
<div class="h-sm"></div>
</body></html>
