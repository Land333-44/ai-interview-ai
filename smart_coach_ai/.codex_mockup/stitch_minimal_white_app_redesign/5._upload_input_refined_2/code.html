<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#dadada",
                    "surface-variant": "#e2e2e2",
                    "secondary-container": "#e2dfde",
                    "surface-container-high": "#e8e8e8",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#464650",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#1a1b24",
                    "surface-tint": "#7B61FF",
                    "tertiary-container": "#74737f",
                    "surface-container-low": "#f3f3f4",
                    "secondary": "#5f5e5e",
                    "on-primary": "#ffffff",
                    "on-background": "#1a1c1c",
                    "primary": "#7B61FF",
                    "background": "#f9f9f9",
                    "outline": "#797587",
                    "surface-container-highest": "#e2e2e2",
                    "on-primary-fixed-variant": "#441cc8",
                    "on-secondary-fixed": "#1c1b1b",
                    "inverse-surface": "#2f3131",
                    "primary-fixed-dim": "#c9bfff",
                    "primary-container": "#7B61FF",
                    "inverse-on-surface": "#f0f1f1",
                    "tertiary-fixed": "#e3e1ee",
                    "tertiary-fixed-dim": "#c6c5d2",
                    "surface-bright": "#f9f9f9",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#fffbff",
                    "inverse-primary": "#c9bfff",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#1a0063",
                    "tertiary": "#5b5b66",
                    "on-surface": "#1a1c1c",
                    "on-secondary-container": "#636262",
                    "on-secondary-fixed-variant": "#474746",
                    "on-error-container": "#93000a",
                    "surface-container": "#eeeeee",
                    "surface": "#f9f9f9",
                    "secondary-fixed-dim": "#c8c6c5",
                    "primary-fixed": "#e5deff",
                    "on-tertiary-container": "#fffbff",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#e5e2e1",
                    "on-surface-variant": "#484555",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c9c4d8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "sm": "8px",
                    "xs": "4px",
                    "unit": "4px",
                    "lg": "24px",
                    "gutter": "12px",
                    "container-padding": "20px",
                    "md": "16px"
            },
            "fontFamily": {
                    "h3": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "body-md": ["Manrope"],
                    "h1": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "h2": ["Manrope"]
            },
            "fontSize": {
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "h1": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                    "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .custom-dashed {
        background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%23C9C4D8' stroke-width='2' stroke-dasharray='8%2c 8' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        border-radius: 16px;
      }
    </style>
</head>
<body class="bg-surface-bright font-body-md text-on-surface min-h-screen pb-24">
<!-- Top App Bar -->
<header class="bg-white/80 backdrop-blur-md border-b border-surface-container sticky top-0 z-50 flex justify-between items-center w-full h-16 px-5">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full active:bg-surface-container transition-colors text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-3">
<img alt="Smart Coach AI Logo" class="w-7 h-7 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ugNCEkW7KjOpvgSBqbOClusn4isbjxqTQKCIkFxGFIRLVvH6l9P6dH6z5NEA8qIhwGF296MLMb4uK7iFJPmpEAlspMybiNCPoWf23szRlvQLyeDZuV3lz-DiC3WMJUwN-m_lPcxxALIPLDcBe6CkeaZKMtKOqJQIkjDsDOUHf6poRijAu4SeovEDwppZ0pjLrI9B5hbF5UGHL1Y1jIUCMDkP3jnUy3Ym0Opa8MsiafJI7bNsuj8VcbR5sY"/>
<h1 class="font-h2 text-lg text-on-surface">New Session</h1>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full active:bg-surface-container transition-colors text-on-surface">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<main class="max-w-md mx-auto px-container-padding pt-lg">
<!-- Input Type Selection -->
<section class="mb-xl">
<h2 class="font-h2 text-h2 mb-md text-on-surface">Choose your input type</h2>
<div class="grid grid-cols-3 gap-md">
<!-- Video Option -->
<button class="flex flex-col items-center p-lg bg-white rounded-2xl border border-surface-container shadow-sm hover:shadow-md active:scale-95 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-sm group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-secondary group-hover:text-primary" data-icon="videocam">videocam</span>
</div>
<span class="font-label-sm text-label-sm text-secondary group-hover:text-primary transition-colors">Video</span>
</button>
<!-- Audio Option -->
<button class="flex flex-col items-center p-lg bg-white rounded-2xl border-2 border-primary shadow-[0_4px_12px_rgba(123,97,255,0.15)] active:scale-95 transition-all">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-primary" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<span class="font-label-sm text-label-sm text-primary font-bold">Audio</span>
</button>
<!-- Text Option -->
<button class="flex flex-col items-center p-lg bg-white rounded-2xl border border-surface-container shadow-sm hover:shadow-md active:scale-95 transition-all group">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-sm group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-secondary group-hover:text-primary" data-icon="description">description</span>
</div>
<span class="font-label-sm text-label-sm text-secondary group-hover:text-primary transition-colors">Text</span>
</button>
</div>
</section>
<!-- Upload Area -->
<section class="mb-xl">
<div class="custom-dashed p-xl flex flex-col items-center justify-center bg-white text-center cursor-pointer hover:bg-surface-container-low transition-all min-h-[220px] shadow-sm">
<div class="w-16 h-16 bg-primary/5 rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<p class="font-h3 text-h3 text-on-surface mb-xs">Upload file or drag &amp; drop</p>
<p class="font-body-md text-secondary px-lg">MP4, MOV, MP3 or WAV (Max. 500MB)</p>
</div>
<!-- AI Tip Card -->
<div class="mt-lg p-md bg-primary-fixed/30 rounded-2xl flex items-start gap-4 border border-primary/10">
<div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center flex-shrink-0 shadow-sm">
<span class="material-symbols-outlined text-primary" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<p class="font-label-sm text-primary uppercase tracking-widest text-[10px] mb-xs">AI Insight</p>
<p class="font-body-md text-on-surface-variant leading-relaxed">High-quality audio recording ensures 98% more accurate motion analysis and coaching feedback.</p>
</div>
</div>
</section>
<!-- Primary Action -->
<section class="mt-xl">
<button class="w-full h-14 bg-primary text-on-primary rounded-2xl font-h3 flex items-center justify-center shadow-[0_12px_24px_-8px_rgba(123,97,255,0.5)] active:scale-[0.98] transition-all hover:brightness-110">
                Continue
            </button>
</section>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-white/95 backdrop-blur-md border-t border-surface-container flex justify-around items-center h-20 px-2 pb-safe shadow-[0_-4px_16px_rgba(0,0,0,0.02)]">
<button class="flex flex-col items-center justify-center text-secondary w-16 h-full active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px]" data-icon="dashboard">dashboard</span>
<span class="font-label-sm text-[10px] mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-primary w-16 h-full active:scale-90 transition-transform">
<div class="bg-primary/10 rounded-xl p-1.5 flex flex-col items-center">
<span class="material-symbols-outlined text-[24px]" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-sm text-[10px] mt-0.5 font-bold uppercase">Upload</span>
</div>
</button>
<button class="flex flex-col items-center justify-center text-secondary w-16 h-full active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px]" data-icon="analytics">analytics</span>
<span class="font-label-sm text-[10px] mt-1">Analysis</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary w-16 h-full active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px]" data-icon="smart_toy">smart_toy</span>
<span class="font-label-sm text-[10px] mt-1">Coach</span>
</button>
</nav>
</body></html>
