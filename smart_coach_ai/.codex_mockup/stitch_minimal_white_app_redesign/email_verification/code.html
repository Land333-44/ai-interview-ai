<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#c8c6c5",
                    "secondary-fixed": "#e5e2e1",
                    "outline": "#797587",
                    "on-surface": "#1a1c1c",
                    "on-secondary-container": "#636262",
                    "inverse-surface": "#2f3131",
                    "on-background": "#1a1c1c",
                    "inverse-on-surface": "#f0f1f1",
                    "on-primary-fixed": "#1a0063",
                    "on-secondary-fixed": "#1c1b1b",
                    "on-primary-container": "#fffbff",
                    "surface-container": "#eeeeee",
                    "surface-tint": "#5d3fe0",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-dim": "#dadada",
                    "on-tertiary-fixed-variant": "#464650",
                    "surface-container-highest": "#e2e2e2",
                    "secondary-container": "#e2dfde",
                    "primary": "#5b3cdd",
                    "on-surface-variant": "#484555",
                    "surface-container-high": "#e8e8e8",
                    "primary-fixed": "#e5deff",
                    "surface-bright": "#f9f9f9",
                    "on-tertiary-fixed": "#1a1b24",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "outline-variant": "#c9c4d8",
                    "surface-container-low": "#f3f3f4",
                    "inverse-primary": "#c9bfff",
                    "on-primary-fixed-variant": "#441cc8",
                    "on-primary": "#ffffff",
                    "primary-container": "#7459f7",
                    "on-tertiary-container": "#fffbff",
                    "tertiary-fixed-dim": "#c6c5d2",
                    "secondary": "#5f5e5e",
                    "surface": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "tertiary": "#5b5b66",
                    "on-secondary": "#ffffff",
                    "tertiary-container": "#74737f",
                    "on-secondary-fixed-variant": "#474746",
                    "primary-fixed-dim": "#c9bfff",
                    "background": "#f9f9f9",
                    "tertiary-fixed": "#e3e1ee",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "sm": "8px",
                    "unit": "4px",
                    "md": "16px",
                    "gutter": "12px",
                    "xl": "32px",
                    "lg": "24px",
                    "container-padding": "20px"
            },
            "fontFamily": {
                    "label-sm": ["Manrope"],
                    "h3": ["Manrope"],
                    "h1": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "h2": ["Manrope"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],
                    "h1": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                    "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                    "h2": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-light {
            background-color: rgba(244, 242, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800 shadow-[0_4px_15px_0_rgba(0,0,0,0.06)] docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-5 h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-[#7B61FF] dark:text-[#A291FF]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] text-lg font-bold tracking-tight text-slate-900 dark:text-white">Smart Coach AI</h1>
</div>
<div class="flex items-center">
<button class="active:scale-95 transition-transform duration-200 text-[#7B61FF] dark:text-[#A291FF]">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-container-padding py-xl">
<div class="w-full max-w-md">
<!-- Verification Card -->
<div class="bg-white rounded-[24px] shadow-[0_4px_15px_0_rgba(0,0,0,0.06)] border border-[#E9ECEF] p-xl flex flex-col items-center text-center">
<!-- Security Icon -->
<div class="w-20 h-20 rounded-full bg-[#F4F2FF] flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-[#7B61FF] text-[40px]" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<!-- Headline -->
<h2 class="font-h1 text-h1 text-on-surface mb-sm">Check your email</h2>
<!-- Description -->
<p class="font-body-md text-body-md text-secondary mb-xl px-2">
                    We've sent a 4-digit code to your email. Please enter it below to verify your identity.
                </p>
<!-- 4-Digit Input Grid -->
<div class="grid grid-cols-4 gap-gutter mb-xl w-full max-w-[280px]">
<input class="w-full h-16 text-center font-h2 text-h2 bg-surface-bright border border-outline-variant rounded-xl focus:border-[#7B61FF] focus:ring-2 focus:ring-[#7B61FF]/20 outline-none transition-all" maxlength="1" type="text" value="4"/>
<input class="w-full h-16 text-center font-h2 text-h2 bg-surface-bright border border-outline-variant rounded-xl focus:border-[#7B61FF] focus:ring-2 focus:ring-[#7B61FF]/20 outline-none transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="w-full h-16 text-center font-h2 text-h2 bg-surface-bright border border-outline-variant rounded-xl focus:border-[#7B61FF] focus:ring-2 focus:ring-[#7B61FF]/20 outline-none transition-all" maxlength="1" placeholder="·" type="text"/>
<input class="w-full h-16 text-center font-h2 text-h2 bg-surface-bright border border-outline-variant rounded-xl focus:border-[#7B61FF] focus:ring-2 focus:ring-[#7B61FF]/20 outline-none transition-all" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full h-[56px] bg-[#87CEEB] text-white font-h3 text-h3 rounded-full shadow-[0_8px_25px_0_rgba(135,206,235,0.3)] active:scale-95 transition-all duration-200 mb-lg">
                    Verify
                </button>
<!-- Resend Action -->
<div class="flex items-center gap-xs font-label-sm text-label-sm text-secondary">
                    Didn't receive the code?
                    <button class="text-[#87CEEB] font-bold hover:underline active:opacity-70 transition-opacity">
                        Resend Code
                    </button>
</div>
</div>
<!-- Footer Action -->
<div class="mt-xl text-center">
<button class="flex items-center justify-center gap-sm mx-auto text-[#87CEEB] font-body-lg text-body-lg font-bold hover:underline active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[20px]" data-icon="keyboard_backspace">keyboard_backspace</span>
                    Back to Login
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused Journey/Transactional Screen) -->
<!-- As per 'Shell Visibility & Relevance' rule, we exclude global nav for task-focused verification screens -->
</body></html>
