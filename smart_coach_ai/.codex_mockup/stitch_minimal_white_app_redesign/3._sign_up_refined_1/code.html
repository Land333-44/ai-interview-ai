<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#dadada",
                        "surface-variant": "#e2e2e2",
                        "secondary-container": "#e2dfde",
                        "surface-container-high": "#e8e8e8",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#464650",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#1a1b24",
                        "surface-tint": "#7B61FF",
                        "tertiary-container": "#74737f",
                        "surface-container-low": "#f3f3f4",
                        "secondary": "#5f5e5e",
                        "on-primary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "primary": "#7B61FF",
                        "background": "#f9f9f9",
                        "outline": "#797587",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary-fixed-variant": "#441cc8",
                        "on-secondary-fixed": "#1c1b1b",
                        "inverse-surface": "#2f3131",
                        "primary-fixed-dim": "#c9bfff",
                        "primary-container": "#7B61FF",
                        "inverse-on-surface": "#f0f1f1",
                        "tertiary-fixed": "#F5F3FF",
                        "tertiary-fixed-dim": "#EDE9FE",
                        "surface-bright": "#f9f9f9",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "inverse-primary": "#c9bfff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#1a0063",
                        "tertiary": "#5b5b66",
                        "on-surface": "#1a1c1c",
                        "on-secondary-container": "#636262",
                        "on-secondary-fixed-variant": "#474746",
                        "on-error-container": "#93000a",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "secondary-fixed-dim": "#c8c6c5",
                        "primary-fixed": "#e5deff",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e5e2e1",
                        "on-surface-variant": "#484555",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#E5E7EB"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "sm": "8px",
                        "xs": "4px",
                        "unit": "4px",
                        "lg": "24px",
                        "gutter": "12px",
                        "container-padding": "24px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "h3": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "h1": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "h2": ["Manrope"]
                    },
                    "fontSize": {
                        "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "500"}],
                        "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0 10px 40px -10px rgba(123, 97, 255, 0.08), 0 4px 12px -4px rgba(0, 0, 0, 0.03);
        }
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 4px rgba(123, 97, 255, 0.1);
        }
        .ai-glow {
            background: linear-gradient(135deg, #F5F3FF 0%, #FFFFFF 100%);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface antialiased">
<main class="min-h-screen flex flex-col items-center justify-start bg-[#FDFDFF] py-xl">
<div class="w-full max-w-[440px] px-container-padding">
<!-- Header Section -->
<header class="mb-xl text-center">
<div class="flex justify-center mb-lg">
<div class="relative">
<div class="absolute -inset-2 bg-primary/10 rounded-full blur-xl"></div>
<img alt="Smart Coach AI Logo" class="relative h-16 w-16 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ugNCEkW7KjOpvgSBqbOClusn4isbjxqTQKCIkFxGFIRLVvH6l9P6dH6z5NEA8qIhwGF296MLMb4uK7iFJPmpEAlspMybiNCPoWf23szRlvQLyeDZuV3lz-DiC3WMJUwN-m_lPcxxALIPLDcBe6CkeaZKMtKOqJQIkjDsDOUHf6poRijAu4SeovEDwppZ0pjLrI9B5hbF5UGHL1Y1jIUCMDkP3jnUy3Ym0Opa8MsiafJI7bNsuj8VcbR5sY"/>
</div>
</div>
<h1 class="font-h1 text-h1 text-on-background mb-xs tracking-tight">Create Account <span class="inline-block animate-bounce-slow">🚀</span></h1>
<p class="font-body-lg text-secondary opacity-80">Start your journey with precision coaching</p>
</header>
<!-- Main Form Card -->
<section class="bg-white soft-shadow p-lg rounded-xl border border-outline-variant/40 mb-lg">
<form class="space-y-lg">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-secondary/80 px-1 uppercase tracking-wider block">Full Name</label>
<div class="relative flex items-center group input-focus-ring rounded-lg transition-all">
<span class="material-symbols-outlined absolute left-4 text-primary group-focus-within:scale-110 transition-transform" style="font-size: 20px;">person</span>
<input class="w-full h-[56px] pl-12 pr-4 rounded-lg bg-surface-bright border-outline-variant/60 focus:border-primary focus:ring-0 transition-all duration-200 font-body-md text-on-surface placeholder:text-outline/50" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-secondary/80 px-1 uppercase tracking-wider block">Email Address</label>
<div class="relative flex items-center group input-focus-ring rounded-lg transition-all">
<span class="material-symbols-outlined absolute left-4 text-primary group-focus-within:scale-110 transition-transform" style="font-size: 20px;">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 rounded-lg bg-surface-bright border-outline-variant/60 focus:border-primary focus:ring-0 transition-all duration-200 font-body-md text-on-surface placeholder:text-outline/50" placeholder="email@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-secondary/80 px-1 uppercase tracking-wider block">Password</label>
<div class="relative flex items-center group input-focus-ring rounded-lg transition-all">
<span class="material-symbols-outlined absolute left-4 text-primary group-focus-within:scale-110 transition-transform" style="font-size: 20px;">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 rounded-lg bg-surface-bright border-outline-variant/60 focus:border-primary focus:ring-0 transition-all duration-200 font-body-md text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-secondary/60 hover:text-primary active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-secondary/80 px-1 uppercase tracking-wider block">Confirm Password</label>
<div class="relative flex items-center group input-focus-ring rounded-lg transition-all">
<span class="material-symbols-outlined absolute left-4 text-primary group-focus-within:scale-110 transition-transform" style="font-size: 20px;">verified_user</span>
<input class="w-full h-[56px] pl-12 pr-4 rounded-lg bg-surface-bright border-outline-variant/60 focus:border-primary focus:ring-0 transition-all duration-200 font-body-md text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-md">
<button class="w-full h-[58px] bg-primary text-on-primary font-h3 text-h3 rounded-lg shadow-[0_8px_20px_-6px_rgba(123,97,255,0.5)] hover:shadow-[0_12px_24px_-6px_rgba(123,97,255,0.6)] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-sm group" type="submit">
                            Sign Up
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
</section>
<!-- AI Contextual Hint -->
<div class="px-md py-md ai-glow rounded-xl flex items-start gap-md border border-primary/10 mb-xl">
<div class="mt-0.5">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1; font-size: 22px;">auto_awesome</span>
</div>
<p class="font-body-md text-on-tertiary-fixed-variant leading-relaxed">
<span class="font-bold text-primary">Security Tip:</span> Passwords must be 8+ characters with a mix of symbols for maximum protection.
                </p>
</div>
<!-- Footer / Secondary Actions -->
<footer class="text-center pb-xl">
<p class="font-body-md text-secondary">
                    Already have an account? 
                    <a class="text-primary font-bold hover:text-on-primary-fixed-variant transition-colors ml-1" href="#">Log In</a>
</p>
<div class="mt-xl relative flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/50"></div>
</div>
<span class="relative bg-[#FDFDFF] px-4 font-label-sm text-label-sm text-secondary/60 tracking-[0.1em]">OR CONTINUE WITH</span>
</div>
<div class="mt-lg flex justify-center gap-md">
<button class="w-[72px] h-[64px] rounded-xl border border-outline-variant/60 bg-white flex items-center justify-center shadow-sm hover:shadow-md hover:border-primary/20 active:scale-95 transition-all">
<svg class="w-6 h-6" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<button class="w-[72px] h-[64px] rounded-xl border border-outline-variant/60 bg-white flex items-center justify-center shadow-sm hover:shadow-md hover:border-primary/20 active:scale-95 transition-all">
<span class="material-symbols-outlined text-on-surface" style="font-size: 28px;">phone_iphone</span>
</button>
</div>
</footer>
</div>
</main>
</body></html>
